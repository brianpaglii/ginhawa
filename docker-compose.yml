services:
  postgres:
    image: postgres:16-alpine
    container_name: ginhawa-postgres
    environment:
      POSTGRES_USER: ginhawa
      POSTGRES_PASSWORD: ginhawakiosk # pragma: allowlist secret
      POSTGRES_DB: ginhawa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ginhawa -d ginhawa"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
