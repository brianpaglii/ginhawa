# Pre-commit configuration for the GINHAWA monorepo.
# Run `uvx pre-commit install` once after cloning. Use `uvx pre-commit run --all-files`
# to invoke the full suite manually. `uvx pre-commit autoupdate` refreshes pinned tags.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, markdown, yaml, json]
        # CLAUDE.md is human-maintained per project rules; never auto-format it.
        exclude: ^CLAUDE\.md$

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # Kiosk-only local hooks. These run only when files under kiosk/
  # change so cloud-only commits don't pay the cost.
  - repo: local
    hooks:
      - id: kiosk-mypy
        name: kiosk mypy --strict
        language: system
        entry: bash -c 'cd kiosk && uv run mypy src/ginhawa_kiosk'
        types: [python]
        files: ^kiosk/src/
        pass_filenames: false
      - id: kiosk-pytest-smoke
        name: kiosk pytest (smoke)
        language: system
        entry: bash -c 'cd kiosk && uv run pytest -q tests/test_smoke.py'
        types: [python]
        files: ^kiosk/(src|tests)/
        pass_filenames: false
