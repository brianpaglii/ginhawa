# Alembic configuration for the kiosk's encrypted SQLite database.
# Symmetric with cloud/alembic.ini; the URL is overridden at runtime by
# kiosk/alembic/env.py from KIOSK_DB_PATH so we never hardcode a path.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = src
version_locations = %(here)s/alembic/versions
path_separator = os

# Default URL — replaced at runtime from Settings.KIOSK_DB_PATH. The
# scheme is sqlite:/// because Alembic uses SQLAlchemy's URL parsing,
# which doesn't know about SQLCipher; env.py builds a real engine
# via create_engine_for_kiosk() which applies the PRAGMA on connect.
sqlalchemy.url = sqlite:///placeholder.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
