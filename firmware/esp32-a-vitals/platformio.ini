; PlatformIO Project Configuration File
;
; ESP32-A — vitals node. Per ADR-0004 + ADR-0018:
;   - MAX30100 pulse oximeter (M5Stack Mini Heart Rate Unit) over I²C
;     publishes spo2 + heart_rate
;   - MLX90640BAB thermal imager over I²C — publishes temperature
;     (centre-ROI peak detection, emissivity 0.98, 25–30 cm working
;     distance to the citizen's forehead at the console platform)
;
; The native env compiles desktop unit tests for signal-processing /
; JSON-encoding logic without flashing a board (CLAUDE.md firmware
; stack: "Native test target configured for desktop unit tests").

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.0
    ; MAX30100 — oxullo's MAX30100lib is the conventional Arduino
    ; driver (registered name is "MAX30100lib"; the GitHub repo is
    ; oxullo/Arduino-MAX30100). Works with the M5Stack Mini Heart
    ; Rate Unit package out of the box.
    oxullo/MAX30100lib@^1.2.1
    ; MLX90640 — Adafruit driver exposes getFrame()-into-float[768]
    ; that matches our centre-ROI peak detection plan.
    adafruit/Adafruit MLX90640@^1.1.1
monitor_speed = 115200
upload_speed = 921600
build_flags = -std=gnu++17
; Exclude single-component bench sketches from the production build
; (they ship their own setup()/loop() which would conflict with main.cpp).
build_src_filter = +<*> -<bench_max30100.cpp>

; Single-component bench env for the MAX30100 pulse oximeter. Strips
; WiFi/MQTT/MLX90640 so the chip can be exercised in isolation on the
; same I²C bus + pins as production (Wire, GPIO 21/22). See
; src/bench_max30100.cpp for the sketch and usage.
;   pio run -e bench_max30100 -t upload
;   pio device monitor
; Diagnostic build of the production firmware. Identical to esp32dev
; except it dumps PART_ID + FIFO occupancy + raw IR/red + library
; state + window-buffer counts every 500 ms from inside loop(). Use
; this when the production firmware shows silent SpO2/HR; it stays
; on the same Wi-Fi/MQTT path so behaviour is comparable.
;   pio run -e esp32dev_diag -t upload
;   pio device monitor
;
; ${env:esp32dev.build_flags} pulls in the parent's flags so we don't
; lose -std=gnu++17 — PlatformIO's `extends` does NOT auto-merge
; build_flags on its own.
[env:esp32dev_diag]
extends = env:esp32dev
build_flags = ${env:esp32dev.build_flags} -D DIAGNOSTIC_MAX30100

[env:bench_max30100]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    oxullo/MAX30100lib@^1.2.1
monitor_speed = 115200
upload_speed = 921600
build_flags = -std=gnu++17
build_src_filter = -<*> +<bench_max30100.cpp>

[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17 -I include
test_filter = test_desktop/*
