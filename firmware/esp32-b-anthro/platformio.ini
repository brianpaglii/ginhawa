; PlatformIO Project Configuration File
;
; ESP32-B — anthropometric stand node. Per ADR-0018 this node is
; height-only:
;   - VL53L0X Time-of-Flight height sensor in long-range mode,
;     validated 120–185 cm; mounted at the top of the stand pillar
;     looking down at the citizen's head.
;
; The MLX90640BAB thermal imager moved to ESP32-A in ADR-0018 because
; its viewing geometry (forehead, 25–30 cm) is naturally satisfied at
; the console platform alongside the MAX30100 shroud, not at the
; vertical stand pillar.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.0
    ; VL53L0X — Pololu's library exposes long-range timing budgets;
    ; long-range is the validated mode for our 120–185 cm working
    ; window.
    pololu/VL53L0X@^1.3.1
monitor_speed = 115200
upload_speed = 921600
build_flags = -std=gnu++17

[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17 -I include
test_filter = test_desktop/*
